<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Dashboard screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="0" y="0" width="240" height="720" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="240" y="0" width="1040" height="64" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="32" y="40" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#111827">OpenFleet</text>
  <text x="280" y="40" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#111827">Dashboard</text>
  <g fill="#ffffff" stroke="#e5e7eb">
    <rect x="280" y="96" width="180" height="88" rx="12"/>
    <rect x="480" y="96" width="180" height="88" rx="12"/>
    <rect x="680" y="96" width="180" height="88" rx="12"/>
    <rect x="880" y="96" width="180" height="88" rx="12"/>
    <rect x="280" y="208" width="460" height="220" rx="12"/>
    <rect x="760" y="208" width="460" height="220" rx="12"/>
    <rect x="280" y="448" width="940" height="220" rx="12"/>
  </g>
  <text x="640" y="680" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280">Replace with a capture of /dashboard  see instructions below</text>
</svg>
