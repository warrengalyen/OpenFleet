# OpenFleet Render Blueprint
# Dashboard: New → Blueprint → connect this repo
# API and Postgres must share the same region for private-network DNS.

services:
  # ── .NET 8 API (Docker) ──────────────────────────────────────
  - type: web
    name: openfleet-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./src/OpenFleet.Api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/live
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: "8080"
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: Database__Host
        fromDatabase:
          name: openfleet-db
          property: host
      - key: Database__Port
        fromDatabase:
          name: openfleet-db
          property: port
      - key: Database__Name
        fromDatabase:
          name: openfleet-db
          property: database
      - key: Database__User
        fromDatabase:
          name: openfleet-db
          property: user
      - key: Database__Password
        fromDatabase:
          name: openfleet-db
          property: password
      # Used to expand short dpg-* hosts to *.oregon-postgres.render.com
      - key: Database__Region
        value: oregon
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: OpenFleet.Api
      - key: Jwt__Audience
        value: OpenFleet.Clients
      - key: Jwt__ExpiryHours
        value: "8"
      # Allow browser calls from the static site (cross-origin)
      - key: Cors__AllowedOrigins__0
        fromService:
          name: openfleet-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── React SPA (Vite static site) ─────────────────────────────
  - type: web
    name: openfleet-web
    runtime: static
    rootDir: src/OpenFleet.Web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Baked into the client bundle at build time
      - key: VITE_API_BASE_URL
        fromService:
          name: openfleet-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: openfleet-db
    databaseName: openfleet
    user: openfleet
    plan: free # expires after 30 days; 1 free DB per workspace
    region: oregon
